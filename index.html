<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Terminal</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="matrix"></canvas>

<div class="terminal">

    <div class="title">

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
